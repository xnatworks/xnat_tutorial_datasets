---
datasets:
  tcia_dicom_intro:
    label: TCIA QIN-PROSTATE-Repeatability MR series (14 slices)
    format: DICOM
    default_project_id: XNAT_TUTORIAL_DICOM
    loader_type: tutorial
    license_label: Creative Commons Attribution 4.0 International (QIN-PROSTATE-Repeatability)
    source_page: https://www.cancerimagingarchive.net/collection/qin-prostate-repeatability/
    fallback_archive_url: datasets/xnat-tutorial/tcia_dicom_intro/archive.zip
    default_download_mode: nbia_series
    nbia_base: https://services.cancerimagingarchive.net/nbia-api/services/v4
    nbia_series_uid: 1.3.6.1.4.1.14519.5.2.1.3671.4754.216645718571142540899096273555
    default_subset_policy: tiny-workshop-subset
    default_limits:
      subjects: 1
      sessions: 1
      series: 1
      max_dicom_files: 30
    notes:
    - Pulled live from TCIA via getImage?SeriesInstanceUID=…  (≈700 KB ZIP).
    - Series is one MR acquisition (14 slices) plus the collection LICENSE.
    - Swap nbia_series_uid for a different TCIA series at site discretion.
  tcia_pseudo_phi_deid:
    label: TCIA Pseudo-PHI DICOM de-identification CT mini-series
    format: DICOM
    default_project_id: XNAT_TUTORIAL_DEID
    loader_type: tutorial
    license_label: Creative Commons Attribution 4.0 International (Pseudo-PHI-DICOM-Data)
    source_page: https://www.cancerimagingarchive.net/collection/pseudo-phi-dicom-data/
    fallback_archive_url: datasets/xnat-tutorial/tcia_pseudo_phi_deid/archive.zip
    default_download_mode: nbia_series
    nbia_base: https://services.cancerimagingarchive.net/nbia-api/services/v4
    nbia_series_uid: 2.25.232511389993471801710506250184624291318
    default_subset_policy: tiny-deidentification-workshop-subset
    expected_source_bytes: 878205
    expected_subject_count: 1
    expected_scan_count: 1
    default_limits:
      subjects: 1
      sessions: 1
      series: 1
      max_dicom_files: 2
    notes:
    - Tiny CT mini-series from TCIA's Pseudo-PHI-DICOM-Data collection for anonymization/de-identification
      teaching.
    - Use this to inspect DICOM headers before and after XNAT anonymization policy
      discussions; do not import the full collection during a live workshop.
  reproin_dicom_to_bids:
    label: ReproIn DICOM phantom for DICOM-to-BIDS
    format: DICOM
    default_project_id: XNAT_TUTORIAL_REPROIN
    loader_type: tutorial
    license_label: HeuDiConv/ReproIn teaching phantom; cite HeuDiConv and ReproIn
      materials
    source_page: https://heudiconv.readthedocs.io/en/latest/reproin.html
    archive_url: https://datasets.datalad.org/repronim/heudiconv-reproin-example/reproin_dicom.zip
    fallback_archive_url: datasets/xnat-tutorial/reproin_dicom_to_bids/archive.zip
    default_download_mode: archive_zip
    default_subset_policy: reproin-dicom-phantom
    expected_source_bytes: 187505920
    expected_subject_count: 1
    expected_scan_count: 7
    default_limits:
      subjects: 1
      sessions: 1
      series: 7
      max_dicom_files: 803
    notes:
    - Generated by the University of Arizona on a Siemens Skyra 3T for the ReproIn/HeuDiConv
      tutorial.
    - Loads source DICOM into XNAT; use prepared HeuDiConv output or a tested container
      command when demonstrating conversion to BIDS.
  bidscoin_dicom_to_bids:
    label: BIDScoin tutorial DICOM subset for DICOM-to-BIDS
    format: DICOM
    default_project_id: XNAT_TUTORIAL_BIDSCOIN
    loader_type: tutorial
    license_label: BIDScoin tutorial data; cite BIDScoin and its tutorial materials
    source_page: https://bidscoin.readthedocs.io/en/stable/tutorial.html
    fallback_archive_url: datasets/xnat-tutorial/bidscoin_dicom_to_bids/archive.zip
    default_download_mode: archive_zip
    default_subset_policy: bidscoin-sub-001-dicom
    expected_source_bytes: 170844248
    expected_subject_count: 1
    expected_scan_count: 11
    default_limits:
      subjects: 1
      sessions: 1
      series: 11
      max_dicom_files: 712
    notes:
    - Curated from the public BIDScoin tutorial archive, keeping raw DICOM for
      `sub-001` only so the dataset remains small enough for live workshops.
    - Includes anatomical, functional, SBRef, and fieldmap series suitable for a
      practical DICOM-to-BIDS walkthrough.
    - Local validation showed all image series convert with dcm2niix; the
      behavioral sidecar folder is preserved as non-DICOM tutorial metadata.
  openneuro_flanker_bids:
    label: OpenNeuro ds000102 Flanker BIDS subset
    format: BIDS/NIfTI
    default_project_id: XNAT_TUTORIAL_BIDS
    loader_type: tutorial
    license_label: PDDL for ds000102; newer OpenNeuro datasets generally use CC0
    source_page: https://github.com/OpenNeuroDatasets/ds000102
    s3_prefix: s3://openneuro.org/ds000102
    https_prefix: https://s3.amazonaws.com/openneuro.org/ds000102
    fallback_https_prefix: datasets/openneuro/ds000102
    default_subjects:
    - sub-01
    default_limits:
      subjects: 1
      functional_runs: 1
    include:
    - dataset_description.json
    - participants.tsv
    - T1w.json
    - task-flanker_bold.json
    - "{subject}/anat/{subject}_T1w.nii.gz"
    - "{subject}/func/{subject}_task-flanker_run-1_bold.nii.gz"
    - "{subject}/func/{subject}_task-flanker_run-1_events.tsv"
    notes:
    - Keep default subset small for workshops.
    - Allow instructors to increase subject count before a course.
  niivue_demo_images:
