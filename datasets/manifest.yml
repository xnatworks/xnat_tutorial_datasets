  fitlins_flanker_demo:
    label: OpenNeuro Flanker demo for FitLins
    format: XNAT sessions with BIDS sidecars
    default_project_id: XNAT_TUTORIAL_FITLINS
    loader_type: grouplevel_fitlins_flanker
    target_workflow: fitlins
    license_label: PDDL
    source_page: https://github.com/OpenNeuroDatasets/ds000102
    notes:
    - 'Uses the Group-Level plugin import: creates subjects, MR sessions, T1w/BOLD
      scans, NIfTI resources, and BIDS metadata.'
  msd_hippocampus_nnunet:
    label: MSD Hippocampus demo for nnU-Net
    format: XNAT sessions with nnU-Net resources
    default_project_id: XNAT_TUTORIAL_SEG
    loader_type: grouplevel_nnunet_msd
    loader_dataset: task04_hippocampus
    target_workflow: nnunet
    license_label: CC-BY-SA 4.0
    source_page: https://decathlon-10.grand-challenge.org/
    default_training_cases: 10
    notes:
    - 'Uses the Group-Level plugin import: pulls the MSD source and creates XNAT subjects,
      sessions, scans, NIfTI image resources, and label resources.'
  tcia_collection_smallest:
    label: TCIA QIN-PROSTATE-Repeatability — smallest series in collection (auto-selected)
    format: DICOM
    default_project_id: XNAT_TUTORIAL_DICOM
    loader_type: tutorial
    license_label: Creative Commons Attribution 4.0 International (QIN-PROSTATE-Repeatability)
    source_page: https://www.cancerimagingarchive.net/collection/qin-prostate-repeatability/
    fallback_archive_url: datasets/xnat-tutorial/tcia_collection_smallest/archive.zip
    default_download_mode: nbia_collection
    nbia_base: https://services.cancerimagingarchive.net/nbia-api/services/v4
    nbia_collection: QIN-PROSTATE-Repeatability
    nbia_collection_limit: 1
    nbia_collection_modality: MR
    default_subset_policy: tiny-workshop-subset
    notes:
    - Picks the smallest MR series in the collection by FileSize.
    - Useful when a site doesn't want to pin a specific series UID forever.
  tcia_mouse_astrocytoma_mri:
