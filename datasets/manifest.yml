    format: DICOM
    default_project_id: XNAT_TUTORIAL_MOUSE
    loader_type: tutorial
    license_label: Creative Commons Attribution 3.0 Unported
    source_page: https://www.cancerimagingarchive.net/collection/mouse-astrocytoma/
    fallback_archive_url: datasets/xnat-tutorial/tcia_mouse_astrocytoma_mri/archive.zip
    default_download_mode: nbia_series
    nbia_base: https://services.cancerimagingarchive.net/nbia-api/services/v4
    nbia_series_uid: 1.3.46.670589.11.17169.5.0.5780.2010092712094570350.3
    default_subset_policy: tiny-preclinical-workshop-subset
    default_limits:
      subjects: 1
      sessions: 1
      series: 1
      max_dicom_files: 30
    notes:
    - Small public preclinical mouse MRI DICOM series suitable for a quick XNAT import
      walkthrough.
    - Use this when the tutorial should demonstrate non-human imaging data.
  openneuro_ds002551_metadata:
    label: OpenNeuro ds002551 rodent participant metadata
    format: Tabular metadata
    default_project_id: XNAT_TUTORIAL_RODENT
    loader_type: tutorial
    target_workflow: dynamic-data-type
    license_label: CC0
    source_page: https://openneuro.org/datasets/ds002551
    source_label: OpenNeuro ds002551 Mouse_rest_awake
    source_dataset_id: ds002551
    default_dataset_label: rodent-participant-metadata
    https_prefix: https://s3.amazonaws.com/openneuro.org/ds002551
    fallback_https_prefix: datasets/openneuro/ds002551-metadata
    default_subset_policy: participants-metadata-only
    expected_source_bytes: 1676
    expected_subject_count: 7
    expected_scan_count: 0
    include:
    - dataset_description.json
    - participants.tsv
    - participants.json
    notes:
    - Non-imaging preclinical metadata table for the dynamic data type tutorial.
