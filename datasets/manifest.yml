    source_dataset_id: niivue-demo-images
    default_dataset_label: niivue-demo-images
    https_prefix: https://raw.githubusercontent.com/niivue/niivue-demo-images/main
    fallback_https_prefix: datasets/niivue-demo-images
    default_subset_policy: demo02-niivue-samples
    expected_source_bytes: 144824864
    expected_subject_count: 13
    expected_scan_count: 34
    include:
    - README.md
    - LICENSE
    - manifest.json
    - CT_AVM.nii.gz
